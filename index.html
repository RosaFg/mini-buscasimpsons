<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simpsons Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MINI SIMPSONS</h1>
        <span class="logo-sub">Quote &amp; Scene Search</span>
    </header>

    <div class="search-area">
        <div class="search-field">
            <input type="text" id="searchInput" placeholder="Busca un personaje, frase o episodio...">
            <button id="cargarDatos">Buscar</button>
        </div>
    </div>

    <div id="loader">
        <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <section id="resultado">
        <div class="state">
            <div class="state-title">Listo para buscar</div>
            <div class="state-body">Escribe algo arriba y presiona Buscar o Enter</div>
        </div>
    </section>

    <div class="load-more-wrap" id="loadMoreWrap">
        <button id="loadMoreBtn">Cargar mas</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
